<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>AMOLED Snake</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      background: #000;

      color: #00ff66;

      font-family: 'Press Start 2P', monospace;

      width: 100vw;
      height: 100vh;

      overflow: hidden;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      touch-action: none;

    }

    h1 {

      font-size: 18px;

      margin-bottom: 15px;

      text-shadow: 0 0 10px #00ff66;

    }

    #score {

      margin-bottom: 15px;

      font-size: 14px;

      color: #00ff66;

      text-shadow: 0 0 8px #00ff66;

    }

    canvas {

      background: #000;

      border: 4px solid #00ff66;

      border-radius: 12px;

      box-shadow:
        0 0 10px #00ff66,
        0 0 30px #00ff66;

      image-rendering: pixelated;

      width: 95vw;
      height: 95vw;

      max-width: 95vh;
      max-height: 95vh;

    }

    #gameover {

      position: fixed;

      inset: 0;

      background: rgba(0,0,0,0.9);

      display: none;

      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 25px;

      z-index: 999;

    }

    #gameover h2 {

      color: #ff0033;

      font-size: 24px;

      text-shadow:
        0 0 10px #ff0033,
        0 0 20px #ff0033;

    }

    button {

      padding: 15px 25px;

      border: 2px solid #00ff66;

      background: #000;

      color: #00ff66;

      font-family: 'Press Start 2P', monospace;

      font-size: 12px;

      border-radius: 10px;

      box-shadow: 0 0 10px #00ff66;

    }

    button:active {

      transform: scale(0.95);

    }

  </style>
</head>

<body>

  <h1>AMOLED SNAKE</h1>

  <div id="score">
    SCORE: 0
  </div>

  <canvas
    id="game"
    width="400"
    height="400"
  ></canvas>

  <div id="gameover">

    <h2>GAME OVER</h2>

    <button onclick="restartGame()">
      RESTART
    </button>

  </div>

  <script>

    // Fullscreen auto

    document.body.addEventListener("touchstart", () => {

      if (!document.fullscreenElement) {

        document.documentElement.requestFullscreen()
          .catch(() => {});

      }

    }, { once: true });



    const canvas = document.getElementById("game");

    const ctx = canvas.getContext("2d");

    const scoreText = document.getElementById("score");

    const gameover = document.getElementById("gameover");



    const gridSize = 20;

    const tileCount = canvas.width / gridSize;



    let snake = [
      { x: 10, y: 10 }
    ];



    let dx = 1;
    let dy = 0;



    let food = {
      x: 15,
      y: 15
    };



    let score = 0;

    let running = true;



    // Keyboard controls

    document.addEventListener("keydown", (e) => {

      const key = e.key.toLowerCase();



      if ((key === "arrowup" || key === "w") && dy === 0) {

        dx = 0;
        dy = -1;

      }



      if ((key === "arrowdown" || key === "s") && dy === 0) {

        dx = 0;
        dy = 1;

      }



      if ((key === "arrowleft" || key === "a") && dx === 0) {

        dx = -1;
        dy = 0;

      }



      if ((key === "arrowright" || key === "d") && dx === 0) {

        dx = 1;
        dy = 0;

      }

    });



    // Touch swipe controls

    let touchStartX = 0;
    let touchStartY = 0;



    canvas.addEventListener("touchstart", (e) => {

      touchStartX = e.touches[0].clientX;

      touchStartY = e.touches[0].clientY;

    });



    canvas.addEventListener("touchend", (e) => {

      const touchEndX = e.changedTouches[0].clientX;

      const touchEndY = e.changedTouches[0].clientY;



      const diffX = touchEndX - touchStartX;

      const diffY = touchEndY - touchStartY;



      if (Math.abs(diffX) > Math.abs(diffY)) {

        if (diffX > 0 && dx === 0) {

          dx = 1;
          dy = 0;

        }



        if (diffX < 0 && dx === 0) {

          dx = -1;
          dy = 0;

        }

      } else {

        if (diffY > 0 && dy === 0) {

          dx = 0;
          dy = 1;

        }



        if (diffY < 0 && dy === 0) {

          dx = 0;
          dy = -1;

        }

      }

    });



    function drawGame() {

      if (!running) return;



      const head = {

        x: snake[0].x + dx,

        y: snake[0].y + dy

      };



      // Wall collision

      if (

        head.x < 0 ||

        head.y < 0 ||

        head.x >= tileCount ||

        head.y >= tileCount

      ) {

        endGame();

        return;

      }



      // Self collision

      for (let part of snake) {

        if (

          head.x === part.x &&

          head.y === part.y

        ) {

          endGame();

          return;

        }

      }



      snake.unshift(head);



      // Eat food

      if (

        head.x === food.x &&

        head.y === food.y

      ) {

        score++;

        scoreText.innerText =
          "SCORE: " + score;



        food = {

          x: Math.floor(Math.random() * tileCount),

          y: Math.floor(Math.random() * tileCount)

        };

      } else {

        snake.pop();

      }



      // AMOLED background

      ctx.fillStyle = "#000";

      ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );



      // Food glow

      ctx.shadowBlur = 20;

      ctx.shadowColor = "#ff0033";

      ctx.fillStyle = "#ff0033";

      ctx.fillRect(

        food.x * gridSize,

        food.y * gridSize,

        gridSize - 2,

        gridSize - 2

      );



      // Snake glow

      ctx.shadowBlur = 20;

      ctx.shadowColor = "#00ff66";

      ctx.fillStyle = "#00ff66";



      for (let part of snake) {

        ctx.fillRect(

          part.x * gridSize,

          part.y * gridSize,

          gridSize - 2,

          gridSize - 2

        );

      }

    }



    function endGame() {

      running = false;

      gameover.style.display = "flex";

    }



    function restartGame() {

      snake = [
        { x: 10, y: 10 }
      ];



      dx = 1;
      dy = 0;



      food = {
        x: 15,
        y: 15
      };



      score = 0;

      running = true;



      scoreText.innerText =
        "SCORE: 0";



      gameover.style.display = "none";

    }



    setInterval(drawGame, 110);

  </script>

</body>
</html>
