<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>Immersive AMOLED Snake</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{

      width:100%;
      height:100%;

      overflow:hidden;

      background:#000;

      touch-action:none;

      font-family:'Press Start 2P', monospace;

    }

    body{

      position:fixed;
      inset:0;

    }

    canvas{

      position:fixed;
      inset:0;

      width:100vw;
      height:100vh;

      background:#000;

      image-rendering:pixelated;

    }

    #hud{

      position:fixed;

      top:15px;
      left:15px;

      z-index:10;

      color:#00ff66;

      text-shadow:
        0 0 5px #00ff66,
        0 0 15px #00ff66;

      font-size:14px;

      pointer-events:none;

    }

    #speed{

      margin-top:10px;

      color:#00ccff;

      text-shadow:
        0 0 5px #00ccff,
        0 0 15px #00ccff;

    }

    #gameover{

      position:fixed;

      inset:0;

      display:none;

      flex-direction:column;
      align-items:center;
      justify-content:center;

      background:rgba(0,0,0,0.85);

      z-index:100;

      gap:30px;

    }

    #gameover h1{

      color:#ff0033;

      font-size:28px;

      text-shadow:
        0 0 10px #ff0033,
        0 0 30px #ff0033;

    }

    button{

      border:none;

      padding:18px 30px;

      border-radius:14px;

      background:#00ff66;

      color:#000;

      font-size:14px;

      font-family:'Press Start 2P', monospace;

      box-shadow:
        0 0 15px #00ff66;

    }

    button:active{

      transform:scale(0.95);

    }

  </style>
</head>

<body>

  <div id="hud">

    <div id="score">
      SCORE: 0
    </div>

    <div id="speed">
      SPEED: 1x
    </div>

  </div>

  <canvas id="game"></canvas>

  <div id="gameover">

    <h1>GAME OVER</h1>

    <button onclick="restartGame()">
      RESTART
    </button>

  </div>

  <script>

    // Auto fullscreen

    document.body.addEventListener("touchstart", () => {

      if (!document.fullscreenElement) {

        document.documentElement
          .requestFullscreen()
          .catch(() => {});

      }

    }, { once:true });



    const canvas =
      document.getElementById("game");

    const ctx =
      canvas.getContext("2d");



    const scoreText =
      document.getElementById("score");

    const speedText =
      document.getElementById("speed");

    const gameover =
      document.getElementById("gameover");



    function resizeCanvas(){

      canvas.width =
        window.innerWidth;

      canvas.height =
        window.innerHeight;

    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );



    const gridSize = 25;



    let snake = [

      { x: 10, y: 10 }

    ];



    let dx = 1;
    let dy = 0;



    let score = 0;

    let running = true;



    let gameSpeed = 120;

    let gameLoop;



    function randomFood(){

      return {

        x: Math.floor(
          Math.random() *
          (canvas.width / gridSize)
        ),

        y: Math.floor(
          Math.random() *
          (canvas.height / gridSize)
        )

      };

    }



    let food = randomFood();



    // Keyboard controls

    document.addEventListener(
      "keydown",
      (e)=>{

      const key =
        e.key.toLowerCase();



      if(
        (key==="arrowup"||key==="w")
        && dy===0
      ){

        dx=0;
        dy=-1;

      }



      if(
        (key==="arrowdown"||key==="s")
        && dy===0
      ){

        dx=0;
        dy=1;

      }



      if(
        (key==="arrowleft"||key==="a")
        && dx===0
      ){

        dx=-1;
        dy=0;

      }



      if(
        (key==="arrowright"||key==="d")
        && dx===0
      ){

        dx=1;
        dy=0;

      }

    });



    // Swipe controls

    let touchStartX = 0;
    let touchStartY = 0;



    canvas.addEventListener(
      "touchstart",
      (e)=>{

      touchStartX =
        e.touches[0].clientX;

      touchStartY =
        e.touches[0].clientY;

    });



    canvas.addEventListener(
      "touchend",
      (e)=>{

      const endX =
        e.changedTouches[0].clientX;

      const endY =
        e.changedTouches[0].clientY;



      const diffX =
        endX - touchStartX;

      const diffY =
        endY - touchStartY;



      if(
        Math.abs(diffX) >
        Math.abs(diffY)
      ){

        if(diffX > 0 && dx===0){

          dx=1;
          dy=0;

        }

        if(diffX < 0 && dx===0){

          dx=-1;
          dy=0;

        }

      } else {

        if(diffY > 0 && dy===0){

          dx=0;
          dy=1;

        }

        if(diffY < 0 && dy===0){

          dx=0;
          dy=-1;

        }

      }

    });



    function drawGame(){

      if(!running) return;



      const head = {

        x: snake[0].x + dx,

        y: snake[0].y + dy

      };



      const maxX =
        Math.floor(
          canvas.width / gridSize
        );

      const maxY =
        Math.floor(
          canvas.height / gridSize
        );



      // Wall collision

      if(

        head.x < 0 ||

        head.y < 0 ||

        head.x >= maxX ||

        head.y >= maxY

      ){

        endGame();
        return;

      }



      // Self collision

      for(let part of snake){

        if(

          head.x===part.x &&

          head.y===part.y

        ){

          endGame();
          return;

        }

      }



      snake.unshift(head);



      // Eat food

      if(

        head.x===food.x &&

        head.y===food.y

      ){

        score++;

        scoreText.innerText =
          "SCORE: " + score;



        // Dynamic speed

        if(gameSpeed > 40){

          gameSpeed -= 5;

          clearInterval(gameLoop);

          gameLoop =
            setInterval(
              drawGame,
              gameSpeed
            );

        }



        const speedLevel =
          Math.floor(
            (120 - gameSpeed) / 10
          ) + 1;



        speedText.innerText =
          "SPEED: " + speedLevel + "x";



        food = randomFood();

      } else {

        snake.pop();

      }



      // AMOLED black background

      ctx.fillStyle = "#000";

      ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
      );



      // Food glow

      ctx.shadowBlur = 25;

      ctx.shadowColor = "#ff0033";

      ctx.fillStyle = "#ff0033";

      ctx.fillRect(

        food.x * gridSize,

        food.y * gridSize,

        gridSize - 2,

        gridSize - 2

      );



      // Snake glow

      ctx.shadowBlur = 20;

      ctx.shadowColor = "#00ff66";

      ctx.fillStyle = "#00ff66";



      for(let part of snake){

        ctx.fillRect(

          part.x * gridSize,

          part.y * gridSize,

          gridSize - 2,

          gridSize - 2

        );

      }

    }



    function endGame(){

      running = false;

      gameover.style.display =
        "flex";

    }



    function restartGame(){

      snake = [

        { x:10, y:10 }

      ];



      dx=1;
      dy=0;



      score=0;

      running=true;



      gameSpeed = 120;



      scoreText.innerText =
        "SCORE: 0";



      speedText.innerText =
        "SPEED: 1x";



      food = randomFood();



      gameover.style.display =
        "none";



      clearInterval(gameLoop);

      gameLoop =
        setInterval(
          drawGame,
          gameSpeed
        );

    }



    gameLoop =
      setInterval(
        drawGame,
        gameSpeed
      );

  </script>

</body>
</html>
