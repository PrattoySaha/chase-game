<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      height: 100vh;
      overflow: hidden;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score {
      margin-bottom: 10px;
      font-size: 22px;
    }

    canvas {
      background: #111;
      border: 4px solid #444;
      border-radius: 20px;

      width: 95vw;
      max-width: 500px;

      height: 95vw;
      max-height: 500px;

      touch-action: none;
    }

    #gameover {
      margin-top: 15px;
      display: none;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 12px 24px;

      border: none;
      border-radius: 12px;

      background: lime;
      color: black;

      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Snake Game</h1>

  <div id="score">Score: 0</div>

  <canvas id="game" width="400" height="400"></canvas>

  <div id="gameover">
    <h2>Game Over</h2>

    <button onclick="restartGame()">
      Restart
    </button>
  </div>

  <script>

    const canvas = document.getElementById("game");

    const ctx = canvas.getContext("2d");

    const scoreText = document.getElementById("score");

    const gameover = document.getElementById("gameover");



    const gridSize = 20;

    const tileCount = canvas.width / gridSize;



    let snake = [
      { x: 10, y: 10 }
    ];

    let dx = 1;
    let dy = 0;

    let food = {
      x: 15,
      y: 15
    };

    let score = 0;

    let running = true;



    // Keyboard control

    document.addEventListener("keydown", (e) => {

      const key = e.key.toLowerCase();

      if ((key === "arrowup" || key === "w") && dy === 0) {
        dx = 0;
        dy = -1;
      }

      if ((key === "arrowdown" || key === "s") && dy === 0) {
        dx = 0;
        dy = 1;
      }

      if ((key === "arrowleft" || key === "a") && dx === 0) {
        dx = -1;
        dy = 0;
      }

      if ((key === "arrowright" || key === "d") && dx === 0) {
        dx = 1;
        dy = 0;
      }

    });



    // Touch swipe control

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {

      touchStartX = e.touches[0].clientX;

      touchStartY = e.touches[0].clientY;

    });

    canvas.addEventListener("touchend", (e) => {

      const touchEndX = e.changedTouches[0].clientX;

      const touchEndY = e.changedTouches[0].clientY;

      const diffX = touchEndX - touchStartX;

      const diffY = touchEndY - touchStartY;

      if (Math.abs(diffX) > Math.abs(diffY)) {

        if (diffX > 0 && dx === 0) {
          dx = 1;
          dy = 0;
        }

        if (diffX < 0 && dx === 0) {
          dx = -1;
          dy = 0;
        }

      } else {

        if (diffY > 0 && dy === 0) {
          dx = 0;
          dy = 1;
        }

        if (diffY < 0 && dy === 0) {
          dx = 0;
          dy = -1;
        }

      }

    });



    function drawGame() {

      if (!running) return;



      // Move snake

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };



      // Wall collision

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
      ) {
        endGame();
        return;
      }



      // Self collision

      for (let part of snake) {

        if (head.x === part.x && head.y === part.y) {

          endGame();

          return;

        }

      }



      snake.unshift(head);



      // Eat food

      if (head.x === food.x && head.y === food.y) {

        score++;

        scoreText.innerText = "Score: " + score;



        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };

      } else {

        snake.pop();

      }



      // Draw background

      ctx.fillStyle = "#111";

      ctx.fillRect(0, 0, canvas.width, canvas.height);



      // Draw food

      ctx.fillStyle = "red";

      ctx.fillRect(
        food.x * gridSize,
        food.y * gridSize,
        gridSize - 2,
        gridSize - 2
      );



      // Draw snake

      ctx.fillStyle = "lime";

      for (let part of snake) {

        ctx.fillRect(
          part.x * gridSize,
          part.y * gridSize,
          gridSize - 2,
          gridSize - 2
        );

      }

    }



    function endGame() {

      running = false;

      gameover.style.display = "block";

    }



    function restartGame() {

      snake = [
        { x: 10, y: 10 }
      ];

      dx = 1;
      dy = 0;

      food = {
        x: 15,
        y: 15
      };

      score = 0;

      running = true;

      scoreText.innerText = "Score: 0";

      gameover.style.display = "none";

    }



    setInterval(drawGame, 120);

  </script>

</body>
</html>
